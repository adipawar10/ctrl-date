name: ctrl_shift_date
description: Cross-platform productivity calendar app with intelligent scheduling.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6

  # Database - Drift for local SQLite
  drift: ^2.14.1
  sqlite3_flutter_libs: ^0.5.18
  path_provider: ^2.1.1
  path: ^1.8.3

  # Backend - Supabase
  supabase_flutter: ^2.3.0

  # State Management - Riverpod
  flutter_riverpod: ^2.4.9
  riverpod_annotation: ^2.3.3

  # Routing
  go_router: ^13.0.1

  # Networking
  dio: ^5.4.0
  connectivity_plus: ^5.0.2

  # Utilities
  intl: ^0.19.0
  uuid: ^4.2.2

  # Encryption
  cryptography: ^2.7.0

  # Code Generation Annotations
  freezed_annotation: ^2.4.1
  json_annotation: ^4.8.1

  # Notifications
  flutter_local_notifications: ^21.0.0
  timezone: ^0.11.0

  # Local Storage
  shared_preferences: ^2.2.2
  flutter_secure_storage: ^9.0.0

  # Calendar UI
  table_calendar: ^3.0.9

  # UI Components
  flutter_slidable: ^3.0.1
  shimmer: ^3.0.0

  # Platform Utils
  geolocator: ^13.0.2
  url_launcher: ^6.2.3
  share_plus: ^7.2.1
  package_info_plus: 9.0.0
  image_picker: ^1.0.7

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

  # Code Generation
  build_runner: ^2.4.8
  drift_dev: ^2.14.1
  freezed: ^2.4.6
  json_serializable: ^6.7.1
  riverpod_generator: ^2.3.9

  # Testing
  mocktail: ^1.0.1

flutter:
  uses-material-design: true

